# bridge.yaml — ros2_mcp_bridge configuration
#
# All settings are under the ros2_mcp_bridge key so this file can also be
# loaded as a ROS 2 parameter file (ros2 param load ...).
#
# Override the config file path at runtime with:
#   export ROS2_MCP_BRIDGE_CONFIG=/path/to/bridge.yaml

ros2_mcp_bridge:

  # ── MCP server ────────────────────────────────────────────────────────── #
  transport: streamable-http   # FastMCP transport type (do not change)
  host: 0.0.0.0                # Bind address; 0.0.0.0 = all interfaces
  port: 18210                  # HTTP port the MCP server listens on
  path: /ros2                  # URL path; onit connects to http://<ip>:18210/ros2

  # ── Robot limits ─────────────────────────────────────────────────────── #
  robot:
    max_linear_speed: 0.22     # m/s  — TurtleBot3 Burger maximum
    max_angular_speed: 2.84    # rad/s
    # Wheel-radius calibration scale factor.  If move_distance consistently
    # over/under-shoots, run calibrate_motion, measure with a tape measure,
    # and set: scale = odometry_reported / actual_measured.
    # 1.0 = trust odometry as-is.  > 1.0 = odom over-reports distance.
    wheel_radius_scale: 1.0

  # cmd_vel topic for motion commands
  cmd_vel_topic: /cmd_vel

  # Approximate image width used for steering heuristic in approach_object
  image_width: 640

  # Horizontal field of view of the camera (degrees).
  # Used to map detection bounding-box pixel positions to LiDAR angles
  # and for pinhole-model depth estimation.  Typical webcams: 55–70°.
  camera_hfov_deg: 62.0

  # Height of the 2D LiDAR scan plane above ground (metres).
  # Objects whose top is below this height generate no LiDAR return;
  # the bridge uses a bbox-based depth estimate as fallback.
  lidar_height_m: 0.13

  # ── Approach object tuning ─────────────────────────────────────────────── #
  # Controls approach_object behaviour — tune these to match your detector
  # latency and robot dynamics.  No rebuild needed; just restart the bridge.
  approach_object:
    max_speed: 0.15          # m/s — cruise speed when far from the target
    min_speed: 0.05          # m/s — minimum speed when close (reduces motion blur)
    step_size: 0.15          # m — incremental drive distance per step during blind approach
    slow_distance: 0.8       # m — start decelerating when closer than this
    lost_retries: 5          # stop-and-rescan attempts before declaring target lost
    rescan_pause: 0.4        # seconds to wait after stopping for a clean frame
    vlm_fallback: true       # ask VLM to verify when YOLO loses track (requires
                             # vlm_agent.enabled: true above)

  # ── DSL Runtime ───────────────────────────────────────────────────────── #
  # Python-DSL execution engine for real-time reactive robot behaviours.
  # The LLM writes small Python programs that run locally on the robot,
  # closing the sense→decide→act loop at ~20 Hz without round-tripping
  # every sensor frame to the cloud.
  dsl_runtime:
    enabled: true              # Set to false to disable all DSL tools
    default_timeout: 30.0      # Default max execution time per run (seconds)
    max_timeout: 300.0         # Hard ceiling on per-run timeout (seconds)

  # ── Collision avoidance ───────────────────────────────────────────────── #
  # LiDAR-based collision avoidance applied to all linear motion commands.
  # Each movement tool also exposes a per-call `collision_avoidance` parameter
  # that can override this global switch.
  collision_avoidance:
    enabled: true             # Master switch; set to false to disable globally
    min_front_distance: 0.30  # m — suppress forward motion if obstacle closer
    min_rear_distance:  0.20  # m — suppress backward motion if obstacle closer

  # ── Topic subscriptions ───────────────────────────────────────────────── #
  # Each entry: {topic: <ros2 topic>, type: <pkg/MsgType>}
  # Add or remove entries to match your robot's topic layout.
  topics:

    camera:
      topic: /camera/image_raw/compressed
      type: sensor_msgs/CompressedImage

    laser:
      topic: /scan
      type: sensor_msgs/LaserScan

    odom:
      topic: /odom
      type: nav_msgs/Odometry

    detections:
     topic: /detections
     type: vision_msgs/Detection2DArray

    # Battery state (sensor_msgs/BatteryState) — available on both stock
    # TurtleBot3 and Pico variants.  Tools degrade gracefully if absent.
    battery:
      topic: /battery_state
      type: sensor_msgs/BatteryState

    # TurtleBot3-specific sensor state (encoder counts, torque, bumper).
    # Requires turtlebot3_msgs to be installed.  The MCP tool returns an
    # error if the topic never publishes — safe to leave enabled.
    sensor_state:
      topic: /sensor_state
      type: turtlebot3_msgs/SensorState

    # IMU data (orientation, angular velocity, linear acceleration).
    # On the Pico variant this is the BNO055 / BNO085 9-DOF NDOF fusion sensor
    # (Grove 6 / Grove 1).  On stock TurtleBot3 this is the MPU-9250 on OpenCR.
    imu:
      topic: /imu
      type: sensor_msgs/Imu

    # Magnetometer (calibrated, SI Tesla).
    # Published by the BNO055/BNO085 on the Pico variant.
    # /magnetic_field is published by turtlebot3_node on the Burger with BNO055.
    # /mag is an alias some configurations remap to; /magnetic_field is authoritative.
    mag:
      topic: /magnetic_field
      type: sensor_msgs/MagneticField

    # Wheel joint positions and velocities from the encoders.
    joint_states:
      topic: /joint_states
      type: sensor_msgs/JointState

    # Uncomment to also subscribe to AMCL / map-frame pose
    # amcl_pose:
    #   topic: /amcl_pose
    #   type: geometry_msgs/PoseWithCovarianceStamped

  # ── VLM Vision Sub-agent (A2A) ────────────────────────────────────────── #
  # A dedicated Vision-Language Model agent running as an onit A2A server.
  # The planner calls ask_vision_agent(); the bridge forwards the camera frame
  # and question here and returns the VLM's analysis.
  #
  # Setup:
  #   1. Install onit on the robot:  pip install onit
  #   2. Copy onit/configs/vlm_agent.yaml to the robot and edit the model URL.
  #   3. Start the VLM A2A server on the robot:
  #        onit --a2a --config /path/to/vlm_agent.yaml
  #   4. Set enabled: true below and restart the bridge.
  #
  # The VLM agent only needs a vision-capable model endpoint (vLLM, Ollama,
  # OpenRouter etc.) and the onit PromptsMCPServer on the same host.
  vlm_agent:
    enabled: false
    url: http://localhost:9002   # A2A server URL (onit --a2a --config configs/vlm_agent.yaml)
    # timeout is controlled per-call via ask_vision_agent's timeout parameter

  # Cosmos-Reason2-8B — NVIDIA robotics-specific VLM.
  # Fine-tuned from Qwen3-VL for physical AI: embodied reasoning, navigation
  # safety, obstacle avoidance, and "what should the robot do next?" planning.
  # Best at: is it safe to move forward? spatial bounding boxes, action planning.
  #
  # Start the A2A agent on the robot:
  #   onit --a2a --config ~/turtlebot3_ws/onit/configs/cosmos_agent.yaml
  cosmos_agent:
    enabled: false
    url: http://localhost:9003   # A2A server URL (onit --a2a --config configs/cosmos_agent.yaml)
    # timeout is controlled per-call via ask_cosmos_agent's timeout parameter
